name: Build and Push Images (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./homeval-web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeval-web:latest

      - name: Build and push api (shared for api/ml)
        uses: docker/build-push-action@v6
        with:
          context: ./homeval-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeval-api:latest

      - name: Build and push analysis
        uses: docker/build-push-action@v6
        with:
          context: ./homeval-analysis
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeval-analysis:latest

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeval-nginx:latest
